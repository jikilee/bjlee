<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>탁상시계 - iPad Mini 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; font-family: monospace; 
            background: #000 url('image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMDAwIi8+PC9zdmc+') center/cover;
            color: #0f0; text-align: center; 
        }
        #clock { font-size: 25vw; font-weight: bold; letter-spacing: 0.1em; margin: 20px 0; text-shadow: 0 0 20px #0f0; font-family: 'Courier New', monospace; }
        #weather { font-size: 6vw; margin: 10px; opacity: 0.8; }
        #location { font-size: 4vw; color: #0ff; }
        #modes { position: absolute; top: 10px; left: 10px; }
        .mode-btn { background: rgba(0,255,0,0.3); color: #0f0; border: 2px solid #0f0; padding: 10px; margin: 5px; border-radius: 10px; font-size: 3vw; cursor: pointer; }
        .mode-btn.active { background: #0f0; color: black; }
        #controls { position: absolute; bottom: 20px; width: 100%; }
        button { background: rgba(0,0,255,0.5); color: white; border: none; padding: 15px 30px; margin: 5px; border-radius: 20px; font-size: 4vw; cursor: pointer; }
        #settings { position: absolute; top: 10px; right: 10px; }
        #bg-input { font-size: 3vw; padding: 5px; background: rgba(0,0,0,0.7); color: white; border: 1px solid #0f0; }
        #time-display { display: none; }
        .show { display: block !important; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div id="modes">
        <div class="mode-btn active" onclick="switchMode('clock')">시계</div>
        <div class="mode-btn" onclick="switchMode('stopwatch')">스톱워치</div>
        <div class="mode-btn" onclick="switchMode('timer')">타이머</div>
    </div>
    
    <div id="settings">
        <input type="text" id="bg-url" placeholder="배경 URL" oninput="setBg()">
        <input type="file" id="bg-file" accept="image/*" onchange="setBgFile(this.files[0])">
    </div>
    
    <div id="clock">--:--:--</div>
    <div id="weather">--°C, --</div>
    <div id="location">위치 로딩 중...</div>
    
    <div id="controls">
        <button onclick="control('start')">▶ 시작</button>
        <button onclick="control('stop')">⏸ 정지</button>
        <button onclick="control('reset')">🔄 리셋</button>
        <div id="timer-input" style="display:none; font-size:4vw;">
            <input id="th" value="0" min="0" max="23" size="2">시 
            <input id="tm" value="5" min="0" max="59" size="2">분 
            <input id="ts" value="0" min="0" max="59" size="2">초 
            <button onclick="setTimer()">설정</button>
        </div>
    </div>

    <script>
        let currentMode = 'clock';
        let timerInt = null;
        let stopwatchStart = 0;
        let elapsed = 0;
        let remaining = 0;
        let weatherInterval = null;
        let lat = 37.40, lon = 126.93; // Anyang 기본

        // API 키: OpenWeatherMap 무료 키 발급받아 넣으세요 (https://openweathermap.org/api)
        const API_KEY = 'YOUR_API_KEY_HERE'; // 여기에 키 입력!

        function switchMode(newMode) {
            currentMode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (newMode === 'timer') {
                document.getElementById('timer-input').style.display = 'block';
            } else {
                document.getElementById('timer-input').style.display = 'none';
            }
            control('reset');
            updateDisplay();
        }

        function updateDisplay() {
            let now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            let clockEl = document.getElementById('clock');
            if (currentMode === 'clock') {
                clockEl.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            } else if (currentMode === 'stopwatch') {
                clockEl.textContent = formatTime(elapsed);
            } else if (currentMode === 'timer') {
                clockEl.textContent = formatTime(remaining);
            }
        }

        function formatTime(secs) {
            let h = Math.floor(secs / 3600);
            let m = Math.floor((secs % 3600) / 60);
            let s = secs % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function control(action) {
            clearInterval(timerInt);
            if (action === 'start') {
                if (currentMode === 'stopwatch') stopwatchStart = Date.now() - elapsed * 1000;
                timerInt = setInterval(() => {
                    if (currentMode === 'stopwatch') {
                        elapsed = Math.floor((Date.now() - stopwatchStart) / 1000);
                    } else if (currentMode === 'timer' && remaining > 0) {
                        remaining--;
                        if (remaining <= 0) alarm();
                    }
                    updateDisplay();
                }, 1000);
            } else if (action === 'reset') {
                if (currentMode === 'stopwatch') elapsed = 0;
                if (currentMode === 'timer') remaining = 0;
            }
            updateDisplay();
        }

        function setTimer() {
            remaining = (parseInt(document.getElementById('th').value)||0)*3600 + 
                        (parseInt(document.getElementById('tm').value)||0)*60 + 
                        (parseInt(document.getElementById('ts').value)||0);
            updateDisplay();
        }

        function alarm() {
            let clockEl = document.getElementById('clock');
            clockEl.classList.add('blink');
            document.getElementById('title').textContent = '⏰ 완료! ⏰';
            if (navigator.vibrate) navigator.vibrate(200);
            setTimeout(() => clockEl.classList.remove('blink'), 5000);
        }

        // 위치
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                document.getElementById('location').textContent = `위도: ${lat.toFixed(2)}, 경도: ${lon.toFixed(2)}`;
                getWeather();
            });
        }

        // 날씨 (1시간마다 업데이트)
        async function getWeather() {
            try {
                let res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`);
                let data = await res.json();
                document.getElementById('weather').textContent = `${Math.round(data.main.temp)}°C, ${data.weather[0].description}`;
            } catch(e) {
                document.getElementById('weather').textContent = '날씨 API 키 필요';
            }
        }

        function setBg() {
            let url = document.getElementById('bg-url').value;
            if (url) document.body.style.backgroundImage = `url(${url})`;
        }

        function setBgFile(file) {
            if (file) {
                let reader = new FileReader();
                reader.onload = e => document.body.style.backgroundImage = `url(${e.target.result})`;
                reader.readAsDataURL(file);
            }
        }

        // 초기화
        setInterval(updateDisplay, 1000);
        if (API_KEY !== 'YOUR_API_KEY_HERE') {
            getWeather();
            weatherInterval = setInterval(getWeather, 3600000);
        }
    </script>
</body>
</html>
